<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Expense &amp; Budget Visualizer — track income and expenses, view your balance, and visualize spending by category.">
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Persistent error banner for localStorage read failures -->
  <div id="error-banner" role="alert" aria-live="assertive" hidden></div>

  <!-- Screen reader live region for transient error announcements -->
  <div id="error-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <header>
    <div id="balance-display" aria-label="Current balance">
      <!-- Balance rendered here by BalanceDisplay module -->
    </div>
  </header>

  <main>
    <!-- Transaction input form -->
    <section aria-labelledby="form-heading">
      <h2 id="form-heading">Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="desc">Description</label>
          <input type="text" id="desc" name="desc" maxlength="100" autocomplete="off" placeholder="e.g. Grocery shopping">
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="e.g. 25.00">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">-- Select category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" name="type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date">
        </div>

        <button type="submit" class="btn-submit">Add Transaction</button>
      </form>
    </section>

    <!-- Transaction history list -->
    <section aria-labelledby="list-heading">
      <h2 id="list-heading">Transaction History</h2>
      <div id="transaction-list" aria-live="polite" aria-relevant="additions removals">
        <!-- Transaction items rendered by TransactionList module -->
      </div>
    </section>

    <!-- Spending chart -->
    <section aria-labelledby="chart-heading">
      <h2 id="chart-heading">Spending by Category</h2>
      <div id="chart-section">
        <canvas id="chart-canvas" width="300" height="300" aria-label="Pie chart of spending by category" role="img"></canvas>
        <!-- Chart empty state or legend rendered by Chart module -->
      </div>
    </section>
  </main>

  <footer>
    <p>Data is stored locally in your browser. No data is sent to any server.</p>
  </footer>

  <script defer src="app.js"></script>
</body>
</html>
