<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense & Budget Visualizer</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    }());
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-top">
      <h1>Expense & Budget Visualizer</h1>
      <button id="theme-toggle" title="Toggle dark/light mode">🌞</button>
    </div>
    <p class="balance-label">Total Balance</p>
    <div id="balance-display">Rp 0</div>
  </header>

  <main>

    <!-- Add Transaction Form -->
    <section class="card">
      <h2>Add Transaction</h2>
      <form id="transaction-form">

        <div class="form-group">
          <label for="desc">Item Name</label>
          <input type="text" id="desc" placeholder="e.g. Grocery shopping" maxlength="100">
        </div>

        <div class="form-group">
          <label for="amount">Amount (Rp)</label>
          <input type="number" id="amount" placeholder="e.g. 50000" min="1">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="">-- Select category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>

        <div class="form-group">
          <label for="new-category">New Category</label>
          <div class="input-row">
            <input type="text" id="new-category" placeholder="e.g. Gym" maxlength="30">
            <button type="button" id="add-category-btn">Add</button>
          </div>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>

        <span id="form-error" class="form-error"></span>
        <button type="submit" class="btn-primary">Add Transaction</button>

      </form>
    </section>

    <!-- Pie Chart -->
    <section class="card">
      <h2>Spending by Category</h2>
      <div id="chart-container">
        <canvas id="pie-chart"></canvas>
      </div>
      <div id="chart-empty" class="empty-state" style="display:none">No expense data yet.</div>
    </section>

    <!-- Transaction List -->
    <section class="card">
      <h2>Transaction History</h2>
      <ul id="transaction-list">
        <li class="empty-state">No transactions yet.</li>
      </ul>
    </section>

    <!-- Monthly Summary -->
    <section class="card">
      <h2>Monthly Summary</h2>
      <div id="summary-container">
        <p class="empty-state">No transactions yet.</p>
      </div>
    </section>

  </main>

  <footer>
    <p>RevoU CodingCamp July 2026.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
